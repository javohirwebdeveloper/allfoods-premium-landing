name: Deploy to VPS

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Loyiha papkasiga kiramiz (agar papka nomi boshqacha bo'lsa, o'zgartiring)
            cd /var/www/allfoods-premium-landing || exit
            
            # Yangi kodlarni tortamiz
            git pull origin main
            
            # Kutubxonalarni o'rnatamiz
            npm install
            
            # Next.js loyihani build qilamiz
            npm run build
            
            # PM2 orqali 3003-portda qayta ishga tushiramiz (PM2 global o'rnatilgan bo'lishi kerak)
            pm2 restart allfoods-landing || pm2 start npm --name "allfoods-landing" -- run start -- -p 3003
