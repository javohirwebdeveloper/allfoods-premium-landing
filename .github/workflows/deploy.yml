name: Deploy Landing Page

on:
  push:
    branches: ["TEST"]

jobs:
  deploy:
    environment: TEST-SERVER
    if: github.ref == 'refs/heads/TEST'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install & Build
        run: |
          npm install
          npm run build

      - name: Create .env file
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          source: ".next,.env,public,package.json,package-lock.json,next.config.*"
          target: "/var/www/allfoods-landing"
          strip_components: 0

      - name: Restart app on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /var/www/allfoods-landing
            npm ci --omit=dev
            pm2 restart allfoods-landing 2>/dev/null || pm2 start npm --name allfoods-landing -- run start -- -p 3003
            pm2 save
            echo "✅ Landing deploy muvaffaqiyatli!"
